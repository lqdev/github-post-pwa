<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2ea44f">
    <title>Choose Post Type</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/webp" href="./icon.webp">
    <link rel="stylesheet" href="./styles.css">
</head>

<body class="page-share">
    <div class="container">
        <h1>Create GitHub Post</h1>

        <button class="btn" id="bookmark-btn">
            <span class="icon">🔖</span>
            Bookmark
        </button>

        <button class="btn" id="response-btn">
            <span class="icon">💬</span>
            Response
        </button>

        <button class="btn" id="readlater-btn">
            <span class="icon">📖</span>
            Read It Later
        </button>

        <div class="info" id="page-info">
            Loading shared content...
        </div>
    </div>

    <script src="./share.js"></script>
</body>

</html>
